{% extends "layout.html" %}

{% block body %}
   <h1>Register</h1>
    <form action="/register" method="post">
        <input autocomplete="off" autofocus name="name" placeholder="Name" type="text">

        <p>
            <input type="radio" name="sport" value="Dodgeball" id="dodgeball">
            <label for="dodgeball">Dodgeball</label>

            <input type="radio" name="sport" value="Flag Football" id="flag_football">
            <label for="flag_football">Flag Football</label>

            <input type="radio" name="sport" value="Soccer" id="soccer">
            <label for="soccer">Soccer</label>
        </p>

        <button type="submit">Register</button>
    </form>
{% endblock %}
